spring.application.name=universityERP

# Demo/development credentials only. Override in deployed environments via UNI_ERP_ADMIN_USERNAME and UNI_ERP_ADMIN_PASSWORD.
app.auth.username=${UNI_ERP_ADMIN_USERNAME:admin}
app.auth.password=${UNI_ERP_ADMIN_PASSWORD:admin123}

# Local frontend origins for credentialed CORS (do not use * with allowCredentials).
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080

# Datasource placeholders for local development — override with environment-specific values.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/university_erp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
