spring.application.name=universityERP 

# Demo/development credentials only. Override in deployed environments via UNI_ERP_ADMIN_USERNAME and UNI_ERP_ADMIN_PASSWORD.
app.auth.username=${UNI_ERP_ADMIN_USERNAME:admin}
app.auth.password=${UNI_ERP_ADMIN_PASSWORD:admin123}

# Local frontend origins for credentialed CORS (do not use * with allowCredentials).
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:3000

